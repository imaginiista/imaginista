<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Financeiro | Jorge Cazé</title>
	
    <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg">
    <link rel="shortcut icon" href="/favicon/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-title" content="Imaginista">
    <link rel="manifest" href="/favicon/site.webmanifest">
    <meta name="theme-color" content="#020617">
	
    <style>
        /* ==========================================================
           VARIÁVEIS GLOBAIS E TEMA CINEMÁTICO
           ========================================================== */
        :root {
            --bg-dark: #020617;
            --panel-bg: rgba(15, 23, 42, 0.75);
            --card-bg: rgba(30, 41, 59, 0.85);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --brand-gold: #d4af37;
            --brand-gold-light: #fef08a;
            --status-green: #10b981;
            --status-red: #ef4444;
            --status-blue: #3b82f6;
            --border-subtle: rgba(255, 255, 255, 0.08);
            --glow-spread: 0 0 20px rgba(59, 130, 246, 0.2);
        }

        /* ==========================================================
           RESET E BLOQUEIOS
           ========================================================== */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            -webkit-user-select: none; 
            -ms-user-select: none; 
            user-select: none; 
        }

        /* ==========================================================
           ESTRUTURA PRINCIPAL
           ========================================================== */
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
        }

        /* Efeito Glow Radial de Fundo */
        body::before {
            content: '';
            position: fixed; 
            top: -50%; 
            left: -50%; 
            width: 200%; 
            height: 200%;
            background: radial-gradient(circle at center, rgba(59, 130, 246, 0.05) 0%, transparent 60%);
            z-index: -2; 
            pointer-events: none;
        }

        /* ==========================================================
           EFEITO CANVAS (PARTÍCULAS IA / TECH)
           ========================================================== */
        #techCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* ==========================================================
           LAYOUT WRAPPER (DESKTOP FIRST)
           ========================================================== */
        .app-container {
            flex: 1; 
            display: flex; 
            flex-direction: column;
            width: 100%; 
            max-width: 1200px; 
            margin: 0 auto;
            padding: 20px; 
            gap: 20px; 
            z-index: 1; 
            position: relative;
            height: auto; 
            min-height: calc(100vh - 140px);
        }

        @media (min-width: 1024px) {
            .app-container { 
                flex-direction: row; 
                padding: 40px 20px; 
                gap: 40px; 
                align-items: flex-start;
            }
        }

        /* ==========================================================
           PAINEL ESQUERDO: RESUMO DO CLIENTE
           ========================================================== */
        .dashboard-side {
            width: 100%; /* Garante responsividade em telas menores */
            background: var(--panel-bg);
            border: 1px solid var(--border-subtle);
            border-radius: 16px; 
            padding: 30px;
            display: flex; 
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            flex-shrink: 0;
        }

        @media (min-width: 1024px) {
            .dashboard-side { 
                width: 380px; /* Trava a largura apenas no desktop */
                min-width: 380px;
                position: sticky;
                top: 40px;
            }
        }

        /* CORREÇÃO DO CABEÇALHO (RELÓGIO E SEGURO) */
        .header-top-row { 
            display: flex; 
            flex-wrap: wrap; /* A mágica anti-sobreposição */
            justify-content: space-between; 
            align-items: center; 
            gap: 12px; /* Espaçamento seguro entre os itens */
            margin-bottom: 25px; 
            width: 100%;
        }
        
        .clock-display {
            flex: 1; /* Permite crescer se houver espaço */
            min-width: 160px; /* Garante um tamanho mínimo para não quebrar o texto */
            font-family: monospace; 
            font-size: 0.95rem; 
            color: var(--status-blue);
            background: rgba(59, 130, 246, 0.1); 
            padding: 8px 14px; 
            border-radius: 6px;
            border: 1px solid rgba(59, 130, 246, 0.2); 
            letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.1);
            text-align: center;
            display: inline-flex;
            justify-content: center;
            align-items: center;
        }

        .badge-secure { 
            flex-shrink: 0; /* Impede o cadeado de espremer */
            font-size: 0.8rem; 
            color: var(--status-green); 
            font-weight: bold; 
            display: inline-flex; 
            align-items: center; 
            gap: 5px; 
            border: 1px solid rgba(16, 185, 129, 0.3);
            padding: 6px 12px;
            border-radius: 6px;
            background: rgba(16, 185, 129, 0.05);
            animation: pulseSecure 2.5s infinite;
        }

        @keyframes pulseSecure {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.2); }
            70% { box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .client-info h1 { 
            font-size: 0.85rem; 
            color: var(--brand-gold); 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-bottom: 8px; 
            font-weight: 600; 
        }

        .client-info h2 { 
            font-size: 2.2rem; 
            font-weight: 700; 
            color: #fff; 
            line-height: 1.1; 
            margin-bottom: 8px; 
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            word-wrap: break-word;
        }

        .parcelas-count { 
            font-size: 0.95rem; 
            color: var(--text-muted); 
            background: rgba(255,255,255,0.05);
            padding: 6px 12px;
            border-radius: 6px;
            display: inline-block;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .finance-summary { 
            margin: 30px 0; 
            padding-bottom: 30px; 
            border-bottom: 1px solid var(--border-subtle); 
        }

        .summary-label { 
            font-size: 0.85rem; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin-bottom: 8px; 
        }

        .total-value { 
            font-size: clamp(2.5rem, 5vw, 3.2rem); /* Tipografia fluida responsiva */
            font-weight: 800; 
            color: #fff; 
            line-height: 1; 
            text-shadow: 0 4px 20px rgba(255,255,255,0.1);
            word-break: break-all; /* Evita quebra horizontal */
        }
        
        .late-alert {
            display: none; 
            background: rgba(239, 68, 68, 0.15); 
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: var(--status-red); 
            padding: 12px 15px; 
            border-radius: 8px; 
            font-size: 0.9rem; 
            margin-top: 18px; 
            animation: pulseAlert 2.5s infinite;
            text-align: center;
            width: 100%;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.1);
        }

        @keyframes pulseAlert { 
            0%, 100% { opacity: 1; border-color: rgba(239, 68, 68, 0.4); } 
            50% { opacity: 0.8; border-color: rgba(239, 68, 68, 0.1); } 
        }

        .progress-container { 
            margin-top: 25px; 
            width: 100%;
        }

        .progress-bar-bg { 
            background: rgba(255,255,255,0.05); 
            height: 8px; 
            border-radius: 10px; 
            overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.05);
            width: 100%;
        }

        .progress-bar-fill { 
            height: 100%; 
            background: linear-gradient(90deg, var(--status-green), #34d399); 
            width: 0%; 
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); 
            box-shadow: 0 0 10px var(--status-green);
        }

        .progress-text { 
            display: flex; 
            justify-content: space-between; 
            font-size: 0.85rem; 
            color: var(--text-muted); 
            margin-top: 10px; 
            font-weight: bold; 
        }

        /* CORREÇÃO DO BOX PIX RESPONSIVO */
        .pix-section { 
            background: rgba(16, 185, 129, 0.05); 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid rgba(16, 185, 129, 0.15); 
            width: 100%;
        }

        .pix-header { 
            color: var(--status-green); 
            font-size: 0.8rem; 
            font-weight: bold; 
            margin-bottom: 12px; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            letter-spacing: 1px; 
        }

        .pix-action { 
            display: flex; 
            gap: 10px; 
            flex-wrap: wrap; /* Permite que o botão desça se não houver espaço */
            width: 100%;
        }

        .pix-key-display {
            flex: 1; 
            min-width: 0; /* CRUCIAL: Impede que a div force a largura do container pai */
            background: rgba(0,0,0,0.4); 
            padding: 12px; 
            border-radius: 8px;
            font-family: monospace; 
            font-size: 1.05rem; 
            color: #fff; 
            border: 1px solid rgba(255,255,255,0.1);
            user-select: text; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            white-space: nowrap;
        }

        .btn-copy {
            background: var(--status-green); 
            color: #000; 
            border: none; 
            padding: 12px 20px; /* Padding unificado para ficar estético no mobile */
            border-radius: 8px; 
            font-weight: 800; 
            cursor: pointer; 
            transition: all 0.2s;
            text-transform: uppercase;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-copy:active { transform: scale(0.95); }
        .btn-copy:hover { box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }

        /* ==========================================================
           PAINEL DIREITO: LISTA DE CARNÊS E CONTROLES
           ========================================================== */
        .list-side {
            flex: 1; 
            display: flex; 
            flex-direction: column;
            background: var(--panel-bg); 
            border: 1px solid var(--border-subtle);
            border-radius: 16px; 
            overflow: hidden;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            height: fit-content;
            width: 100%;
        }

        .list-header {
            padding: 25px 30px; 
            border-bottom: 1px solid var(--border-subtle);
            display: flex; 
            flex-wrap: wrap; /* Evita quebra no mobile */
            gap: 15px;
            justify-content: space-between; 
            align-items: center; 
            background: rgba(0,0,0,0.3);
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
        }

        .list-title { 
            font-size: 1rem; 
            font-weight: bold; 
            color: var(--text-main); 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }
        
        .btn-toggle-history {
            background: transparent; 
            border: 1px solid rgba(255,255,255,0.2); 
            color: var(--text-muted);
            padding: 10px 20px; 
            border-radius: 20px; 
            font-size: 0.85rem; 
            cursor: pointer; 
            transition: all 0.3s;
            white-space: nowrap;
        }

        .btn-toggle-history:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .btn-toggle-history.active { background: rgba(251, 191, 36, 0.1); border-color: var(--brand-gold); color: var(--brand-gold-light); }

        .cards-wrapper {
            padding: 30px;
            display: flex; 
            flex-direction: column; 
            gap: 18px;
        }

        .controls-more-less {
            display: flex;
            flex-wrap: wrap; /* Flexibilidade para telas menores */
            gap: 15px;
            margin-top: 10px;
            justify-content: center;
        }

        .btn-action-list {
            background: rgba(59, 130, 246, 0.05);
            border: 1px dashed rgba(59, 130, 246, 0.4);
            color: var(--status-blue);
            padding: 14px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
            min-width: 200px; /* Garante que não fiquem finos demais no wrap */
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
        }

        .btn-action-list:hover {
            background: rgba(59, 130, 246, 0.15);
            border-color: var(--status-blue);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
            color: #fff;
        }

        /* ==========================================================
           DESIGN DOS CARNÊS (CARDS)
           ========================================================== */
        .carne-card {
            background: var(--card-bg); 
            border-radius: 12px; 
            padding: 22px;
            display: flex; 
            flex-wrap: wrap; /* Otimização Mobile */
            gap: 15px;
            justify-content: space-between; 
            align-items: center;
            border-left: 4px solid var(--text-muted); 
            position: relative;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s;
            border-top: 1px solid rgba(255,255,255,0.02);
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .carne-card:hover { 
            transform: translateX(5px); 
            background: rgba(30, 41, 59, 0.95); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .carne-info { flex: 1; min-width: 200px; }

        .carne-info h4 { 
            font-size: 1.2rem; 
            color: #fff; 
            margin-bottom: 8px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            flex-wrap: wrap;
        }

        .carne-obs { 
            font-size: 0.75rem; 
            color: var(--brand-gold); 
            font-weight: bold; 
            background: rgba(251, 191, 36, 0.1); 
            padding: 3px 10px; 
            border-radius: 6px; 
            letter-spacing: 0.5px;
        }

        .carne-date { font-size: 0.9rem; color: var(--text-muted); }
        .carne-date strong { color: var(--text-main); }

        .carne-status-area { 
            display: flex; 
            flex-direction: column; 
            align-items: flex-end; 
            gap: 8px; 
        }

        .status-badge { 
            font-size: 0.75rem; 
            font-weight: 800; 
            padding: 6px 14px; 
            border-radius: 6px; 
            letter-spacing: 1px; 
            text-transform: uppercase; 
            white-space: nowrap;
        }

        .countdown-text { font-size: 0.85rem; font-weight: bold; white-space: nowrap; }

        /* Variações de Status do Carnê */
        .status-open { border-left-color: rgba(255,255,255,0.2); }
        .status-open .status-badge { background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid rgba(255,255,255,0.1); }

        .status-next {
            border-left: 5px solid var(--brand-gold);
            background: linear-gradient(90deg, rgba(30,41,59,1) 0%, rgba(251, 191, 36, 0.08) 100%);
            box-shadow: 0 0 25px rgba(251, 191, 36, 0.15);
            z-index: 2;
        }
        .status-next .status-badge { background: var(--brand-gold); color: #000; box-shadow: 0 2px 10px rgba(251, 191, 36, 0.4); }
        .status-next .countdown-text { color: var(--brand-gold-light); }

        .status-late { border-left-color: var(--status-red); background: rgba(239, 68, 68, 0.05); border-right: 1px solid rgba(239, 68, 68, 0.1); }
        .status-late .status-badge { background: rgba(239, 68, 68, 0.1); color: var(--status-red); border: 1px solid rgba(239, 68, 68, 0.3); }
        
        .status-paid { border-left-color: var(--status-green); opacity: 0.4; filter: grayscale(0.5); display: none; }
        .status-paid.visible { display: flex; }
        .status-paid .status-badge { background: rgba(16, 185, 129, 0.1); color: var(--status-green); border: 1px solid rgba(16, 185, 129, 0.2); }

        .label-highlight {
            position: absolute; 
            top: -12px; 
            left: 20px; 
            background: var(--brand-gold); 
            color: #000;
            font-size: 0.7rem; 
            font-weight: 900; 
            padding: 4px 12px; 
            border-radius: 4px;
            letter-spacing: 1px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        /* ==========================================================
           RODAPÉ (FOOTER) O IMAGINISTA 
           ========================================================== */
        .footer-imaginista {
            background-color: var(--bg-dark);
            padding: 35px 20px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-top: 1px solid var(--border-subtle);
            z-index: 10;
            flex-shrink: 0; 
            width: 100%;
            margin-top: auto;
        }

        .footer-logo-box { margin-bottom: 15px; }

        .footer-logo { 
            height: 55px; 
            width: auto; 
            opacity: 0.9; 
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.1));
            transition: all 0.3s;
            cursor: pointer;
        }

        .footer-logo:hover { opacity: 1; }

        @keyframes sparkAnim {
            0% { filter: brightness(1) drop-shadow(0 0 10px rgba(255,255,255,0.1)); transform: scale(1); }
            50% { filter: brightness(1.5) drop-shadow(0 0 35px var(--brand-gold)); transform: scale(1.08); }
            100% { filter: brightness(1) drop-shadow(0 0 10px rgba(255,255,255,0.1)); transform: scale(1); }
        }
        .spark-effect { animation: sparkAnim 0.6s ease-out; }

        .footer-text { font-size: 0.85rem; color: #64748b; letter-spacing: 0.5px; text-align: center; }
        .dot-gold { color: var(--brand-gold); font-weight: bold; }

        /* ==========================================================
           MENSAGENS FLUTUANTES (TOAST)
           ========================================================== */
        .toast {
            position: fixed; 
            bottom: 40px; 
            left: 50%; 
            transform: translateX(-50%) translateY(150px);
            background: var(--status-green); 
            color: #000; 
            font-weight: 800; 
            padding: 14px 28px; 
            border-radius: 30px;
            z-index: 1000; 
            opacity: 0; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4);
            display: flex; align-items: center; gap: 10px; font-size: 0.95rem; white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* ==========================================================
           AJUSTES RESPONSIVOS (MOBILE) REFINADOS
           ========================================================== */
        @media (max-width: 1023px) {
            .app-container { padding: 15px; gap: 15px; }
            .dashboard-side { padding: 25px 20px; }
            .cards-wrapper { padding: 25px 20px; }
            .list-header { flex-direction: column; text-align: center; }
        }

        @media (max-width: 600px) {
            .header-top-row { justify-content: center; flex-direction: column; align-items: center; }
            .clock-display { width: 100%; font-size: 0.85rem; }
            
            /* O PIX empilha elegante */
            .pix-action { flex-direction: column; }
            .btn-copy { width: 100%; }
            
            /* Os Cards empilham o status e infos */
            .carne-card { flex-direction: column; align-items: flex-start; padding: 20px 15px; }
            .carne-status-area { flex-direction: row; width: 100%; justify-content: space-between; align-items: center; margin-top: 5px; }
            .label-highlight { left: 15px; }
            .controls-more-less { flex-direction: column; }
            .btn-action-list { width: 100%; }
        }

    </style>
</head>
<body oncontextmenu="return false;"> 
    
    <canvas id="techCanvas"></canvas>

    <div id="toastMsg" class="toast"><span>✅</span> Chave PIX copiada com sucesso!</div>

    <div class="app-container">
        
        <aside class="dashboard-side">
            <div class="header-top-row">
                <div class="clock-display" id="liveClock">00:00:00</div>
                <div class="badge-secure"><span>🔒</span> SEGURO</div>
            </div>

            <div class="client-info">
                <h1>Lembrete Financeiro</h1>
                <h2>Jorge Cazé</h2>
                <div class="parcelas-count" id="counterText">Calculando...</div>
            </div>

            <div class="finance-summary">
                <div class="summary-label">Restante a Pagar</div>
                <div class="total-value" id="remainingValue">R$ 0,00</div>
                
                <div id="lateWarning" class="late-alert"></div>
                
                <div class="progress-container">
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="progressBar"></div>
                    </div>
                    <div class="progress-text">
                        <span>Status de Quitação</span>
                        <span id="progressPercent">0%</span>
                    </div>
                </div>
            </div>

            <div class="pix-section">
                <div class="pix-header"><span>💠</span> CHAVE PIX PARA PAGAMENTO</div>
                <div class="pix-action">
                    <div class="pix-key-display" id="pixKey">21983340089</div>
                    <button class="btn-copy" onclick="copyPix()">COPIAR</button>
                </div>
            </div>
        </aside>

        <main class="list-side">
            <div class="list-header">
                <div class="list-title">Histórico de Parcelas</div>
                <button class="btn-toggle-history" id="toggleBtn" onclick="toggleHistory()">
                    👁️ Ver Pagas
                </button>
            </div>

            <div class="cards-wrapper" id="listContainer">
                </div>
        </main>

    </div>

    <footer class="footer-imaginista">
        <div class="footer-logo-box">
            <img src="imagens/logo.png" alt="O Imaginista" class="footer-logo" id="mainLogo" onerror="this.style.display='none'; this.insertAdjacentHTML('afterend', '<h3 style=\'color:#fff; font-weight:300; letter-spacing:3px; font-size: 1.2rem;\'>O IMAGINISTA</h3>');">
        </div>
        <div class="footer-text">
            © 2025 IMAGINISTA<span class="dot-gold">.</span> Todos os direitos reservados.
        </div>
    </footer>

    <script>
        const mainLogo = document.getElementById('mainLogo');
        if (mainLogo) {
            mainLogo.addEventListener('click', function() {
                this.classList.add('spark-effect');
                setTimeout(() => { this.classList.remove('spark-effect'); }, 600); 
            });
        }

        document.addEventListener('contextmenu', event => event.preventDefault());

        document.onkeydown = function(e) {
            if(e.keyCode == 123) { return false; } 
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)){ return false; } 
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)){ return false; } 
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)){ return false; } 
        }

        const parcelas = [
            { id: 1, valor: 130.00, venc: "10/01/2026", obs: "1ª parcela", pago: true },
            { id: 2, valor: 130.00, venc: "10/02/2026", obs: "", pago: true },
            { id: 3, valor: 130.00, venc: "10/03/2026", obs: "", pago: false },
            { id: 4, valor: 130.00, venc: "10/04/2026", obs: "", pago: false },
            { id: 5, valor: 130.00, venc: "10/05/2026", obs: "", pago: false },
            { id: 6, valor: 130.00, venc: "10/06/2026", obs: "", pago: false },
            { id: 7, valor: 130.00, venc: "10/07/2026", obs: "", pago: false },
            { id: 8, valor: 130.00, venc: "10/08/2026", obs: "", pago: false },
            { id: 9, valor: 130.00, venc: "10/09/2026", obs: "", pago: false },
            { id: 10, valor: 130.00, venc: "10/10/2026", obs: "", pago: false },
            { id: 11, valor: 130.00, venc: "10/11/2026", obs: "", pago: false },
            { id: 12, valor: 130.00, venc: "10/12/2026", obs: "", pago: false },
            { id: 13, valor: 130.00, venc: "10/01/2027", obs: "", pago: false },
            { id: 14, valor: 130.00, venc: "10/02/2027", obs: "", pago: false },
            { id: 15, valor: 130.00, venc: "10/03/2027", obs: "", pago: false },
            { id: 16, valor: 130.00, venc: "10/04/2027", obs: "", pago: false },
            { id: 17, valor: 130.00, venc: "10/05/2027", obs: "", pago: false },
            { id: 18, valor: 130.00, venc: "10/06/2027", obs: "", pago: false },
            { id: 19, valor: 130.00, venc: "10/07/2027", obs: "", pago: false },
            { id: 20, valor: 130.00, venc: "10/08/2027", obs: "", pago: false },
            { id: 21, valor: 130.00, venc: "10/09/2027", obs: "", pago: false },
            { id: 22, valor: 130.00, venc: "10/10/2027", obs: "", pago: false },
            { id: 23, valor: 130.00, venc: "10/11/2027", obs: "", pago: false },
            { id: 24, valor: 130.00, venc: "10/12/2027", obs: "", pago: false },
            { id: 25, valor: 130.00, venc: "10/01/2028", obs: "", pago: false },
            { id: 26, valor: 130.00, venc: "10/02/2028", obs: "", pago: false },
            { id: 27, valor: 130.00, venc: "10/03/2028", obs: "", pago: false },
            { id: 28, valor: 130.00, venc: "10/04/2028", obs: "", pago: false },
            { id: 29, valor: 130.00, venc: "10/05/2028", obs: "", pago: false },
            { id: 30, valor: 130.00, venc: "10/06/2028", obs: "", pago: false },
            { id: 31, valor: 130.00, venc: "10/07/2028", obs: "Última parcela", pago: false }
        ];

        let mostrarHistorico = false;
        let limiteVisivel = 4;
        const totalDivida = 4030.00;

        function init() {
            initTechCanvas(); 
            calcularValores();
            renderCards();
            setInterval(updateClock, 1000); 
            updateClock();
        }

        function updateClock() {
            const options = { timeZone: 'America/Sao_Paulo', day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            const now = new Date().toLocaleString('pt-BR', options);
            document.getElementById('liveClock').innerText = now + " | BRT";
        }

        function stringToDate(dateStr) {
            const [day, month, year] = dateStr.split('/');
            return new Date(year, month - 1, day);
        }

        function getDaysDiff(dateStr) {
            const [d, m, y] = dateStr.split('/');
            const target = new Date(y, m - 1, d);
            const today = new Date(); today.setHours(0,0,0,0);
            return Math.ceil((target - today) / (1000 * 60 * 60 * 24));
        }

        function formatCurrency(val) { return val.toLocaleString('pt-BR', {style:'currency', currency:'BRL'}); }

        let totaisCalculados = false;
        function calcularValores() {
            if(totaisCalculados) return;

            let totalPago = 0; let qtdPagas = 0; let qtdAtrasadas = 0; let valorAtrasado = 0; let maxDiasAtraso = 0;

            parcelas.forEach(p => {
                const diasRestantes = getDaysDiff(p.venc);
                if(p.pago) {
                    totalPago += p.valor; qtdPagas++; 
                } else {
                    if (diasRestantes < 0) {
                        qtdAtrasadas++; valorAtrasado += p.valor;
                        let diasAbsoluto = Math.abs(diasRestantes);
                        if (diasAbsoluto > maxDiasAtraso) maxDiasAtraso = diasAbsoluto;
                    }
                }
            });

            document.getElementById('counterText').innerHTML = `
                <span style="color: var(--status-green); font-size: 1.3em; font-weight: 800;">${qtdPagas}</span> 
                <span style="color: var(--text-muted);">de</span> 
                <span style="color: var(--brand-gold); font-size: 1.3em; font-weight: 800;">${parcelas.length}</span> 
                <span style="color: var(--text-muted);">pagas</span>
            `;

            document.getElementById('remainingValue').innerText = formatCurrency(totalDivida - totalPago);
            
            const perc = (totalPago / totalDivida) * 100;
            setTimeout(() => { document.getElementById('progressBar').style.width = `${perc}%`; }, 300);
            document.getElementById('progressPercent').innerText = `${perc.toFixed(1)}%`;

            const warning = document.getElementById('lateWarning');
            if(qtdAtrasadas > 0) {
                warning.innerHTML = `
                    <div style="font-size: 1.1em; margin-bottom: 6px; letter-spacing: 0.5px;">
                        ⚠️ ATENÇÃO: <b style="color:#fff;">${qtdAtrasadas} parcela(s)</b> em atraso!
                    </div>
                    <div style="font-size: 0.85em; font-weight: normal; color: var(--text-main);">
                        Vencida há <b style="color: var(--brand-gold);">${maxDiasAtraso} dias</b> • Valor: <b style="color:#fff;">${formatCurrency(valorAtrasado)}</b>
                    </div>
                `;
                warning.style.display = 'block'; 
            } else { warning.style.display = 'none'; }

            totaisCalculados = true;
        }

        function renderCards() {
            const container = document.getElementById('listContainer');
            container.innerHTML = ''; 
            
            let listToRender = parcelas;
            if (!mostrarHistorico) {
                listToRender = parcelas.filter(p => !p.pago);
            }

            let exibidas = listToRender.slice(0, limiteVisivel);
            let nextFound = false;

            exibidas.forEach(p => {
                const diasRestantes = getDaysDiff(p.venc);
                let stateClass = 'status-open'; let statusText = 'Em Aberto'; let countdown = '';

                if(p.pago) {
                    stateClass = 'status-paid'; statusText = 'Quitado';
                } else {
                    if (diasRestantes < 0) {
                        stateClass = 'status-late'; statusText = 'Atrasado';
                    } else if (!nextFound) {
                        stateClass = 'status-next'; statusText = 'Pagar Agora'; nextFound = true;
                        if(diasRestantes === 0) { countdown = `<span style="color:#ef4444">VENCE HOJE</span>`; } 
                        else if (diasRestantes === 1) { countdown = `Vence Amanhã`; } 
                        else { countdown = `Vence em ${diasRestantes} dias`; }
                    }
                }

                const visibilityClass = (p.pago && mostrarHistorico) ? 'visible' : '';

                const div = document.createElement('div');
                div.className = `carne-card ${stateClass} ${visibilityClass}`;
                if(p.pago) div.classList.add('visible');
                
                const labelHTML = stateClass === 'status-next' ? '<div class="label-highlight">PRIORIDADE ALTA</div>' : '';
                const obsHTML = p.obs ? `<span class="carne-obs">${p.obs}</span>` : '';

                div.innerHTML = `
                    ${labelHTML}
                    <div class="carne-info">
                        <h4>Parcela #${p.id.toString().padStart(2, '0')} ${obsHTML}</h4>
                        <div class="carne-date">Vencimento: <strong>${p.venc}</strong> • Valor: ${formatCurrency(p.valor)}</div>
                    </div>
                    <div class="carne-status-area">
                        <div class="status-badge">${statusText}</div>
                        ${countdown ? `<div class="countdown-text">${countdown}</div>` : ''}
                    </div>
                `;
                container.appendChild(div);
            });

            if (listToRender.length > 4) {
                const divControls = document.createElement('div');
                divControls.className = 'controls-more-less';
                
                const btnMore = `<button class="btn-action-list" onclick="actionShowMore()">⏬ Exibir Mais Parcelas</button>`;
                const btnLess = `<button class="btn-action-list" onclick="actionShowLess()">⏫ Recolher Parcelas</button>`;

                if (limiteVisivel >= listToRender.length) { divControls.innerHTML = btnLess; } 
                else if (limiteVisivel === 4) { divControls.innerHTML = btnMore; } 
                else { divControls.innerHTML = btnMore + btnLess; }
                
                container.appendChild(divControls);
            }

            const btn = document.getElementById('toggleBtn');
            btn.className = `btn-toggle-history ${mostrarHistorico ? 'active' : ''}`;
            btn.innerHTML = mostrarHistorico ? "👁️ Ocultar Pagas" : "👁️ Ver Pagas";
        }

        function actionShowMore() { limiteVisivel += 5; renderCards(); }
        function actionShowLess() { limiteVisivel = 4; window.scrollTo({top: 0, behavior: 'smooth'}); renderCards(); }
        function toggleHistory() { mostrarHistorico = !mostrarHistorico; limiteVisivel = 4; renderCards(); }

        function copyPix() {
            const pixKey = document.getElementById('pixKey').innerText;
            navigator.clipboard.writeText(pixKey).then(() => {
                const btn = document.querySelector('.btn-copy');
                const orig = btn.innerText; btn.innerText = "COPIADO";
                setTimeout(() => btn.innerText = orig, 2000);
                
                const toast = document.getElementById('toastMsg');
                toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 3500);
            });
        }

        function initTechCanvas() {
            const canvas = document.getElementById('techCanvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            let particles = [];

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }

            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.vx = (Math.random() - 0.5) * 0.5;
                    this.vy = (Math.random() - 0.5) * 0.5;
                    this.size = Math.random() * 2 + 0.5;
                }

                update() {
                    this.x += this.vx; this.y += this.vy;
                    if (this.x < 0 || this.x > width) this.vx *= -1;
                    if (this.y < 0 || this.y > height) this.vy *= -1;
                }

                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(59, 130, 246, 0.4)';
                    ctx.fill();
                }
            }

            const particleCount = Math.min(Math.floor(window.innerWidth / 15), 100);
            for (let i = 0; i < particleCount; i++) { particles.push(new Particle()); }

            function animate() {
                ctx.clearRect(0, 0, width, height);

                for (let i = 0; i < particles.length; i++) {
                    particles[i].update(); particles[i].draw();

                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const distance = Math.sqrt(dx * dx + dy * dy);

                        if (distance < 150) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            const opacity = 1 - (distance / 150);
                            ctx.strokeStyle = `rgba(59, 130, 246, ${opacity * 0.2})`;
                            ctx.lineWidth = 1; ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(animate);
            }
            animate();
        }

        init();
    </script>
</body>
